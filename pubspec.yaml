name: easy_radial_gradient
description: >-
  Design-tool-style radial gradients for Flutter. Define each stop as
  position + color + opacity (like Figma), with optional Gaussian and
  frosted-glass backdrop blur.
version: 1.0.4
repository: https://github.com/keepYaoung/easy-radial-gradient
issue_tracker: https://github.com/keepYaoung/easy-radial-gradient/issues

topics:
  - gradient
  - radial-gradient
  - blur
  - ui
  - design

screenshots:
  - description: "easy_radial_gradient logo — a multi-stop radial gradient orb with a soft glow."
    path: doc/images/logo.png
  - description: "From left: a one-line glow, a 6-stop multi-color gradient, a Gaussian-blurred glow, and a frosted-glass card using backdrop blur."
    path: doc/images/showcase.png

environment:
  sdk: ^3.11.4
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
